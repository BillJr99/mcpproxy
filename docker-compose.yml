# Base compose file — uses named Docker volumes for config and handlers.
# Suitable for production / CI / any environment without the repo checked out.
#
# Populate the named volumes before first run:
#   docker run --rm -v mcpproxy-config:/dst -v "$(pwd)/config/tools":/src alpine cp -r /src/. /dst/
#   docker run --rm -v mcpproxy-handlers:/dst -v "$(pwd)/handlers":/src  alpine cp -r /src/. /dst/
#
# For local development, docker-compose.override.yml (created automatically by
# Docker Compose when present) replaces the named volumes with bind mounts.

services:
  mcp-host:
    build: .
    ports:
      - "8888:8888"
    env_file:
      - ./.env
    environment:
      MCP_TOOL_CONFIG_DIR: "/app/config/tools"
    volumes:
      - mcpproxy-config:/app/config/tools:ro
      - mcpproxy-handlers:/app/handlers:ro

volumes:
  mcpproxy-config:
  mcpproxy-handlers:
